default:
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - script_failure

stages:
  - build
  - publish
  - cleanup

build-jar:
  stage: build
  image: jruby:9.4.14.0
  tags:
    - linux
    - docker
  before_script:
    - apt-get update && apt-get install -y git
    - gem install rake
    - mkdir -p config dist
    - echo "$WARBLE_CONFIG" > config/warble.rb
  script:
    - bundle install
    - bundle exec rake jar
    - VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    - 'curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file dist/tapsoob.jar "${GITLAB_INTERNAL_API}/projects/${CI_PROJECT_ID}/packages/generic/tapsoob/${VERSION}/tapsoob-${VERSION}.jar"'

publish-gem:
  stage: publish
  image: ruby:3.3
  tags:
    - linux
    - docker
  before_script:
    - apt-get update && apt-get install -y git
    - mkdir -p ~/.gem
    - |
      cat > ~/.gem/credentials << EOF
      ---
      :rubygems_api_key: ${RUBYGEMS_API_KEY}
      EOF
    - chmod 600 ~/.gem/credentials
  script:
    - gem build tapsoob.gemspec
    - gem push tapsoob-*.gem
  rules:
    - if: $CI_COMMIT_TAG

publish-gem-jruby:
  stage: publish
  image: jruby:9.4.14.0
  tags:
    - linux
    - docker
  before_script:
    - apt-get update && apt-get install -y git
    - mkdir -p ~/.gem
    - |
      cat > ~/.gem/credentials << EOF
      ---
      :rubygems_api_key: ${RUBYGEMS_API_KEY}
      EOF
    - chmod 600 ~/.gem/credentials
  script:
    - gem build tapsoob.gemspec
    - gem push tapsoob-*.gem
  rules:
    - if: $CI_COMMIT_TAG

cleanup-packages:
  stage: cleanup
  image: alpine:latest
  tags:
    - linux
    - docker
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - apk add --no-cache curl jq
    - |
      echo "Fetching packages..."
      PACKAGES=$(curl -s --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "${GITLAB_INTERNAL_API}/projects/${CI_PROJECT_ID}/packages?per_page=100&sort=desc")
      
      # Find commit SHA versions (8 hex chars, not semver tags)
      # Keep the first one (most recent), delete the rest
      FIRST_NIGHTLY=true
      
      echo "$PACKAGES" | jq -r '.[] | "\(.id) \(.version)"' | while read -r ID VERSION; do
        # Check if version looks like a commit SHA (8 hex characters)
        if echo "$VERSION" | grep -qE '^[0-9a-f]{8}$'; then
          if [ "$FIRST_NIGHTLY" = true ]; then
            echo "Keeping latest nightly: $VERSION"
            FIRST_NIGHTLY=false
          else
            echo "Deleting old nightly: $VERSION (ID: $ID)"
            curl -s --request DELETE --header "JOB-TOKEN: $CI_JOB_TOKEN" \
              ${GITLAB_INTERNAL_API}/projects/${CI_PROJECT_ID}/packages/${ID}"
          fi
        else
          echo "Keeping tagged release: $VERSION"
        fi
      done