stages:
  - build

build-jar:
  stage: build
  image: jruby:9.4.14.0
  tags:
    - linux
    - docker
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apt-get update && apt-get install -y git
  script:
    - bundle install
    - bundle exec rake war
    - mv dist/tapsoob.jar dist/tapsoob-${CI_COMMIT_TAG}.jar
  artifacts:
    paths:
      - dist/*.jar
    expire_in: 1 week